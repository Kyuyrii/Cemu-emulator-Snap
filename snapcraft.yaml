name: cemu-emulator
base: core24
version: '2.6'
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
summary: Nintendo Wii U Emulator
description: |
  Cemu is a Nintendo Wii U emulator that is able to run most Wii U games and homebrew in a playable state. Created by Exzap, and written in C/C++.

  This emulator aims at providing both high-accuracy and performance, and is actively being developed with new features and fixes to increase compatibility, convenience and usability.

  It was written from scratch and development on the project began roughly early 2015.
grade: stable
confinement: strict

apps:
  cemu-emulator:
    command: usr/bin/Cemu
    desktop: usr/applications/cemu-emulator.desktop
    common-id: info.cemu.Cemu
    extensions:
      - gnome
    plugs:
      - unity7
      - screen-inhibit-control
      - audio-playback
      - network
      - network-bind
      - home
      - removable-media
      - mount-observe
      - joystick
      - bluez

parts:
  cemu-emulator:
    plugin: dump
    source: https://github.com/cemu-project/Cemu/releases/download/v2.6/cemu-2.6-ubuntu-22.04-x64.zip
    override-build: |
      craftctl default
      pwd
      ls -l
      mkdir -p $CRAFT_PART_INSTALL/usr/bin/
      mkdir -p $CRAFT_PART_INSTALL/usr/share/Cemu/
      mv -f $CRAFT_PART_INSTALL/Cemu_2.6/Cemu $CRAFT_PART_INSTALL/usr/bin
      mv -f $CRAFT_PART_INSTALL/Cemu_2.6/gameProfiles $CRAFT_PART_INSTALL/usr/share/Cemu/
      mv -f $CRAFT_PART_INSTALL/Cemu_2.6/resources $CRAFT_PART_INSTALL/usr/share/Cemu/
      chmod +x $CRAFT_PART_INSTALL/usr/bin/Cemu
      chmod 777 $CRAFT_PART_INSTALL/usr/bin/Cemu
    prime:
      - usr/bin/Cemu
      - usr/share/Cemu/gameProfiles
      - usr/share/Cemu/resources

  launcher:
    after: [cemu-emulator]
    plugin: dump
    source: ./launcher
    override-build: |
      craftctl default
      pwd
      ls -l
      mkdir -p $CRAFT_PART_INSTALL/usr/applications
      mkdir -p $CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps
      mv -f $CRAFT_PART_INSTALL/cemu-emulator.desktop $CRAFT_PART_INSTALL/usr/applications/
      mv -f $CRAFT_PART_INSTALL/cemu-emulator.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/apps
    prime:
      - usr/applications/cemu-emulator.desktop
      - usr/share/icons/hicolor/scalable/apps/cemu-emulator.png

  dependencies:
    after: [cemu-emulator]
    plugin: nil
    source: .
    stage-packages:
      - libbluetooth3
    prime:
      - usr/lib/x86_64-linux-gnu/
